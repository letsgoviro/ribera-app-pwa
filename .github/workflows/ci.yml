name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Stub values for build — secrets not available in forks/PRs, use placeholders
  NEXT_PUBLIC_API_URL: https://api.ribera.app
  NEXT_PUBLIC_SUPABASE_URL: https://spzpfjwkohsufvrplaom.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_placeholder

jobs:
  check:
    name: Install & Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Use version from packageManager field in package.json (pnpm@11.x)
      - uses: pnpm/action-setup@v4
        # no version: here — reads packageManager from package.json automatically

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate
        working-directory: apps/api

      - name: Type check API
        run: pnpm exec tsc --noEmit
        working-directory: apps/api
        continue-on-error: true   # non-blocking: warns but doesn't fail deploy

      - name: Lint
        run: pnpm lint
        continue-on-error: true   # non-blocking: warnings allowed

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate
        working-directory: apps/api

      - name: Build web app
        run: pnpm exec next build
        working-directory: apps/web

      - name: Build API
        run: pnpm run build
        working-directory: apps/api
