name: ribera-app
region: fra1

# ─────────────────────────────────────────────────────────────────────────────
# Ribera V2 — DigitalOcean App Platform deployment
#
# Architecture (cost-optimised):
#   API (Fastify)     → DO App Platform  ~$5/mo  (512MB, 1vCPU)
#   Database          → Supabase FREE    $0/mo   (500MB, kept alive by GitHub Actions)
#   Auth              → Supabase Auth    $0/mo   (unlimited users on free plan)
#   Storage (images)  → Supabase Storage $0/mo   (1GB)
#   Web/Org/Admin     → Vercel           $0/mo
#   Total server cost: ~$5/month
#
# Supabase free DB sleeps after 7 days inactivity.
# GitHub Actions cron pings /health every 3 days → DB never sleeps.
# See .github/workflows/keep-alive.yml
#
# When you hit significant traffic, uncomment the databases: block below
# and update DATABASE_URL/DIRECT_URL to point to DO Managed PG (~$15/mo).
#
# Setup steps:
#   1. DO console: Apps → Create → GitHub letsgoviro/ribera-app-pwa
#   2. Add secrets (SUPABASE_URL, DATABASE_URL, etc.) in App Settings
#   3. Push to GitHub — auto-deploys on main branch push
#
# Scale-up path (when ready):
#   1. Uncomment databases: section below
#   2. Change DATABASE_URL/DIRECT_URL to ${db.DATABASE_URL}
#   3. Run scripts/migrate-db-to-do.sh to move data
# ─────────────────────────────────────────────────────────────────────────────

# databases:                          # Uncomment to add DO Managed PG (~$15/mo)
#   - name: db
#     engine: PG
#     version: "16"
#     size: db-s-1vcpu-1gb
#     num_nodes: 1
#     production: true

# ── API Service ───────────────────────────────────────────────────────────────
services:
  - name: api
    github:
      repo: letsgoviro/ribera-app-pwa
      branch: main
      deploy_on_push: true
    source_dir: apps/api
    build_command: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm exec prisma generate &&
      pnpm exec prisma migrate deploy &&
      pnpm run build
    run_command: node dist/index.js
    http_port: 3001
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 60
      failure_threshold: 3
      success_threshold: 1
    routes:
      - path: /

    envs:
      # ── Runtime ──────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "3001"
        scope: RUN_TIME
      - key: PUBLIC_WEB_URL
        value: https://ribera.app
        scope: RUN_TIME

      # ── Database — Supabase PostgreSQL (free, kept alive by GitHub Actions) ────
      # Format: postgresql://postgres.{ref}:{password}@{host}:6543/postgres?pgbouncer=true
      # Get from: Supabase Dashboard → Settings → Database → Connection Pooling
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_TIME
        type: SECRET

      # ── Supabase — Auth + DB + Storage ───────────────────────────────────────
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_ANON_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET

      # ── DPO Pay ──────────────────────────────────────────────────────────────
      - key: DPO_COMPANY_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: DPO_COMPANY_ID
        scope: RUN_TIME
        type: SECRET
      - key: DPO_SERVICE_TYPE
        value: "110331"
        scope: RUN_TIME
      - key: DPO_CURRENCY
        value: TZS
        scope: RUN_TIME
      - key: DPO_ENVIRONMENT
        value: live
        scope: RUN_TIME
      - key: DPO_API_URL
        value: https://secure.3gdirectpay.com/API/v6/
        scope: RUN_TIME
      - key: DPO_PAYMENT_URL
        value: https://secure.3gdirectpay.com/payv2.php
        scope: RUN_TIME

      # ── Brevo (email + SMS) ───────────────────────────────────────────────────
      - key: BREVO_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: BREVO_SMTP_USER
        scope: RUN_TIME
        type: SECRET
      - key: BREVO_SMTP_PASS
        scope: RUN_TIME
        type: SECRET
      - key: BREVO_SMTP_HOST
        value: smtp-relay.brevo.com
        scope: RUN_TIME
      - key: BREVO_SMTP_PORT
        value: "587"
        scope: RUN_TIME
      - key: FROM_EMAIL
        value: support@riberaapp.me
        scope: RUN_TIME
      - key: FROM_NAME
        value: Ribera
        scope: RUN_TIME
      # TEST_EMAIL_OVERRIDE — leave unset in production (only set in dev .env)

      # ── Supabase Storage (images) — kept on Supabase free tier ───────────────
      - key: SUPABASE_STORAGE_BUCKET
        value: ribera-assets
        scope: RUN_TIME

      # ── OAuth ────────────────────────────────────────────────────────────────
      - key: OAUTH_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: OAUTH_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: OAUTH_REDIRECT_URL
        value: https://ribera.app/auth/callback
        scope: RUN_TIME

      # ── Security ─────────────────────────────────────────────────────────────
      - key: QR_JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_EMAIL_DOMAIN
        value: ribera.app
        scope: RUN_TIME

      # ── Feature flags ─────────────────────────────────────────────────────────
      - key: SERVICE_FEE_PERCENT
        value: "5"
        scope: RUN_TIME
      - key: ENABLE_BOOST
        value: "true"
        scope: RUN_TIME
